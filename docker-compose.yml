services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_HOST: ${APP_HOST}
      APP_PORT: ${APP_PORT}
      APP_USER_SESSION_TTL: ${APP_USER_SESSION_TTL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
      REDIS_SOCKET_CONNECT_TIMEOUT: ${REDIS_SOCKET_CONNECT_TIMEOUT}
      REDIS_SOCKET_TIMEOUT: ${REDIS_SOCKET_TIMEOUT}
      MONGODB_DATABASE: ${MONGODB_DATABASE}
      MONGODB_USER: ${MONGODB_USER}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      MONGODB_HOST: ${MONGODB_HOST}
      MONGODB_PORT: ${MONGODB_PORT}
      MONGODB_SERVER_SELECTION_TIMEOUT_MS: ${MONGODB_SERVER_SELECTION_TIMEOUT_MS}
      MONGODB_CONNECT_TIMEOUT_MS: ${MONGODB_CONNECT_TIMEOUT_MS}
      MONGODB_SOCKET_TIMEOUT_MS: ${MONGODB_SOCKET_TIMEOUT_MS}
    ports:
      - "${APP_PORT}:${APP_PORT}"
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: ${REDIS_PORT}
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    command:
      - sh
      - -c
      - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            exec redis-server --appendonly yes --port "$$REDIS_PORT" --requirepass "$$REDIS_PASSWORD"
          else
            exec redis-server --appendonly yes --port "$$REDIS_PORT"
          fi
    healthcheck:
      test:
        - CMD-SHELL
        - |
            if [ -n "$$REDIS_PASSWORD" ]; then
              redis-cli -p "$$REDIS_PORT" -a "$$REDIS_PASSWORD" ping
            else
              redis-cli -p "$$REDIS_PORT" ping
            fi
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:8.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    ports:
      - "${MONGODB_PORT}:${MONGODB_PORT}"
    command:
      - --port
      - "${MONGODB_PORT}"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          mongosh --quiet --port "${MONGODB_PORT}" -u "${MONGODB_USER}"
          -p "${MONGODB_PASSWORD}" --authenticationDatabase admin
          --eval 'db.adminCommand({ ping: 1 }).ok'
      interval: 10s
      timeout: 5s
      retries: 5
